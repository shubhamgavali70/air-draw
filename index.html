<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Air Draw</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div class="stage">
      <video id="video" playsinline></video>
      <canvas id="ink"></canvas>
      <canvas id="overlay"></canvas>

      <div class="hud">
        <div class="status" id="status">Loading model…</div>
        <div class="gesture" id="gesture">—</div>
      </div>

      <div class="toolbar">
        <div class="swatches" id="swatches">
          <button class="swatch active" data-color="#ff2d55" style="--c:#ff2d55"></button>
          <button class="swatch" data-color="#ffcc00" style="--c:#ffcc00"></button>
          <button class="swatch" data-color="#34c759" style="--c:#34c759"></button>
          <button class="swatch" data-color="#0a84ff" style="--c:#0a84ff"></button>
          <button class="swatch" data-color="#af52de" style="--c:#af52de"></button>
          <button class="swatch" data-color="#ffffff" style="--c:#ffffff"></button>
        </div>

        <div class="divider"></div>

        <div class="brushes" id="brushes">
          <button class="brush active" data-brush="line" title="Line brush">✏️</button>
          <button class="brush" data-brush="stamp" data-emoji="⭐" title="Star stamp">⭐</button>
          <button class="brush" data-brush="stamp" data-emoji="❤️" title="Heart stamp">❤️</button>
          <button class="brush" data-brush="stamp" data-emoji="🌸" title="Flower stamp">🌸</button>
          <button class="brush" data-brush="stamp" data-emoji="✨" title="Sparkle stamp">✨</button>
          <button class="brush" data-brush="live-cam" title="Stamp a live camera frame at every step of your finger trail">📸</button>
          <button class="brush" data-brush="live-dom" title="Stamp a live screen snapshot (html2canvas) along your trail">🖼️</button>
          <button class="brush" data-brush="pick" title="Pick any element on the page as your brush">🪄</button>
        </div>

        <div class="divider"></div>

        <label class="size">
          <span>Size</span>
          <input type="range" id="size" min="2" max="60" value="8" />
        </label>

        <label class="toggle" title="Cycle hue along each stroke">
          <input type="checkbox" id="rainbow" />
          <span>🌈</span>
        </label>

        <button id="clear" class="btn">Clear</button>
        <button id="save" class="btn">Save</button>
      </div>

      <div class="hint">
        ☝️ draw · ✌️ hover · 🖐 hold to shatter-clear · 🪄 picks a DOM element as your brush
      </div>

      <div id="picker-overlay" hidden>
        <div class="picker-msg">Click any element to turn it into a brush — <kbd>Esc</kbd> to cancel</div>
      </div>

      <div id="shatter-layer"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
