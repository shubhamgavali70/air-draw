<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Air Draw</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div class="stage">
      <video id="video" playsinline></video>
      <canvas id="ink"></canvas>
      <canvas id="overlay"></canvas>

      <div class="hud">
        <div class="status" id="status">Loading model…</div>
        <div class="gesture" id="gesture">—</div>
      </div>

      <div class="toolbar">
        <div class="swatches" id="swatches">
          <button class="swatch active" data-color="#ff2d55" style="--c:#ff2d55"></button>
          <button class="swatch" data-color="#ffcc00" style="--c:#ffcc00"></button>
          <button class="swatch" data-color="#34c759" style="--c:#34c759"></button>
          <button class="swatch" data-color="#0a84ff" style="--c:#0a84ff"></button>
          <button class="swatch" data-color="#af52de" style="--c:#af52de"></button>
          <button class="swatch" data-color="#ffffff" style="--c:#ffffff"></button>
        </div>
        <label class="size">
          <span>Size</span>
          <input type="range" id="size" min="2" max="30" value="6" />
        </label>
        <button id="clear" class="btn">Clear</button>
        <button id="save" class="btn">Save PNG</button>
      </div>

      <div class="hint">
        ☝️ index only = draw · ✌️ index+middle = hover · 🖐 open palm = clear
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
